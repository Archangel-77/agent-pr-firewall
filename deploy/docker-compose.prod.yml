services:
  agent-pr-firewall:
    image: ghcr.io/your-org/agent-pr-firewall:latest
    container_name: agent-pr-firewall
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
